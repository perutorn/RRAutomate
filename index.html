<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skaner R&R - Procesor Obrazu</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #222; color: #eee; }
        .container { background: #333; padding: 20px; border-radius: 10px; border: 1px solid #444; max-width: 400px; margin: auto; }
        #btn-scan { background: #00a2ed; color: white; border: none; padding: 18px; font-size: 1.1rem; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        #status { margin: 15px 0; font-size: 0.9rem; color: #bbb; }
        #result { margin-top: 20px; padding: 15px; background: #1e4620; border-radius: 5px; display: none; border: 1px solid #28a745; }
        canvas { display: none; }
        #debug-preview { max-width: 100%; margin-top: 10px; border: 1px solid #555; display: none; filter: grayscale(100%) contrast(150%); }
    </style>
</head>
<body>

<div class="container">
    <h2>Skaner Maszyn v4</h2>
    <div id="status">System gotowy</div>
    
    <input type="file" accept="image/*" capture="environment" id="camera-input" style="display: none;">
    <button id="btn-scan">FOTO I ANALIZA</button>
    
    <div id="result">
        <small>ZDEKODOWANO:</small><br>
        <strong id="qr-data" style="font-size: 1.4rem;"></strong>
    </div>

    <p style="font-size: 0.7rem; color: #777; margin-top: 20px;">Podgląd przetworzony (High Contrast):</p>
    <canvas id="proc-canvas"></canvas>
    <img id="debug-preview">
</div>

<script>
    const codeReader = new ZXing.BrowserQRCodeReader();
    const input = document.getElementById('camera-input');
    const canvas = document.getElementById('proc-canvas');
    const ctx = canvas.getContext('2d');

    document.getElementById('btn-scan').addEventListener('click', () => input.click());

    input.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('status').innerText = "Przetwarzanie wstępne...";
        const img = new Image();
        img.src = URL.createObjectURL(file);

        img.onload = async () => {
            // OPTYMALIZACJA: Skalujemy do 600px - idealne dla QR
            const scale = 600 / Math.max(img.width, img.height);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            // Nakładamy filtry na Canvas (jak w Photoshopie)
            ctx.filter = "grayscale(100%) contrast(200%) brightness(120%)";
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const processedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById('debug-preview').src = processedDataUrl;
            document.getElementById('debug-preview').style.display = "block";

            document.getElementById('status').innerText = "Dekodowanie ZXing...";
            
            try {
                const result = await codeReader.decodeFromImageUrl(processedDataUrl);
                document.getElementById('qr-data').innerText = result.text;
                document.getElementById('result').style.display = 'block';
                document.getElementById('status').innerText = "SUKCES!";
            } catch (err) {
                document.getElementById('status').innerText = "BŁĄD: Nieczytelne. Spróbuj z innej odległości.";
                console.error(err);
            }
        };
    });
</script>
</body>
</html>
