<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R&R Calc v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #0078d4; --success: #28a745; --danger: #dc3545; --text: #eee; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Ekran startowy i listy */
        .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px; }
        .btn-success { background: var(--success); }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        
        /* Skaner */
        #scanner-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 2px solid #00ff00; }

        /* Panel pomiarowy */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #2a2a2a; padding: 10px; border-radius: 5px; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.7rem; color: #888; }
        
        #input-field { width: 100%; padding: 20px; font-size: 2rem; background: #000; color: #00ff00; border: 2px solid var(--accent); border-radius: 10px; text-align: center; box-sizing: border-box; cursor: pointer; }
        .history { height: 100px; overflow-y: auto; background: #000; padding: 5px; font-family: monospace; font-size: 0.9rem; margin-top: 10px; border-radius: 5px; }
        
        /* Stylizacja Keypada */
        .keypad-holder { display: flex; flex-direction: column; gap: 5px; margin-top: 15px; background: #222; padding: 10px; border-radius: 10px; }
        .keypad-row { display: flex; gap: 5px; justify-content: stretch; }
        .keypad-button, .keypad-enter { 
            flex: 1; padding: 20px; font-size: 1.5rem; background: #444; color: white; border: none; border-radius: 5px; 
            touch-action: manipulation; cursor: pointer;
        }
        .keypad-button:active { background: var(--accent); }
        .keypad-enter { background: var(--success); font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div id="view-start">
    <h2 style="text-align:center">R&R Analizer</h2>
    <button class="btn" onclick="startScanner()">SKANUJ KOD MASZYNY</button>
    <div class="card">
        <label>Lub wybierz ręcznie:</label>
        <select id="manual-select" class="btn" style="background:#333; margin-top:10px" onchange="selectMachine(this.value)">
            <option value="">-- Wybierz maszynę --</option>
        </select>
    </div>
</div>

<div id="view-station" class="hidden">
    <button onclick="showStart()" style="color:var(--accent); background:none; border:none; padding:10px">← Powrót</button>
    <h3 id="selected-machine-name">Maszyna</h3>
    <div id="stations-list"></div>
</div>

<div id="view-measure" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 id="active-station-name">Stacja</h3>
        <span id="counter" style="background:var(--accent); padding:5px 10px; border-radius:15px">0 / 50</span>
    </div>
    
    <div class="stats-grid">
        <div class="stat-box" id="box-cg"><span class="stat-label">Cg (4σ)</span><span class="stat-val" id="val-cg">-</span></div>
        <div class="stat-box" id="box-cgk"><span class="stat-label">Cgk</span><span class="stat-val" id="val-cgk">-</span></div>
        <div class="stat-box"><span class="stat-label">Średnia</span><span class="stat-val" id="val-avg" style="font-size:1rem">-</span></div>
        <div class="stat-box"><span class="stat-label">Odchylenie (s)</span><span class="stat-val" id="val-std" style="font-size:1rem">-</span></div>
    </div>

    <input type="text" id="input-field" placeholder="0.000" readonly onclick="toggleKeypad(true)">
    
    <div class="history" id="history-log"></div>
    <button class="btn btn-success" style="margin-top:15px" onclick="generateReport()">ZAKOŃCZ I RAPORT</button>
    <button class="btn" style="background:#444" onclick="undoLast()">COFNIJ OSTATNI</button>
</div>

<div id="scanner-view" class="hidden">
    <div id="status" style="position:absolute; top:10px; width:100%; text-align:center; z-index:110">Celuj w kod QR</div>
    <video id="video" autoplay playsinline></video>
    <div class="reticle"></div>
    <button onclick="stopScanner()" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); padding:15px; z-index:110">Anuluj</button>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
// --- KONFIGURACJA ---
const katalogMaszyn = {
    "M001": {
        nazwa: "A2-SUB-0020",
        stacje: [
            { id: "s1", nazwa: "Pin A height", tol: 0.02, master: 15.000 },
            { id: "s2", nazwa: "Pin B height", tol: 0.02, master: 15.000 },
            { id: "s3", nazwa: "Swash plate thickness", tol: 0.05, master: 20.000 }
        ]
    }
};

let currentMachine = null;
let currentStation = null;
let measurements = [];

// --- LOGIKA WIDOKÓW I HISTORII ---
function showStart() { 
    document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
    document.getElementById('view-start').classList.remove('hidden');
}

function selectMachine(id) {
    if(!id) return;
    currentMachine = katalogMaszyn[id];
    document.getElementById('selected-machine-name').innerText = currentMachine.nazwa;
    const list = document.getElementById('stations-list');
    list.innerHTML = '';
    currentMachine.stacje.forEach(s => {
        const b = document.createElement('button');
        b.className = 'btn';
        b.style.background = '#444';
        b.innerText = s.nazwa;
        b.onclick = () => startMeasure(s);
        list.appendChild(b);
    });
    document.getElementById('view-start').classList.add('hidden');
    document.getElementById('view-station').classList.remove('hidden');
}

function startMeasure(station) {
    currentStation = station;
    measurements = [];
    document.getElementById('active-station-name').innerText = station.nazwa;
    
    // Zarządzanie widocznością
    document.getElementById('view-station').classList.add('hidden');
    document.getElementById('view-measure').classList.remove('hidden');
    
    // Inicjalizacja Keypada (jeśli go nie ma)
    const measureView = document.getElementById('view-measure');
    if(!document.querySelector('.keypad-holder')){
        const historylog = document.getElementById('history-log');
        measureView.insertBefore(keyPad(), historylog);
    }
    
    // Stan historii: Najpierw widok, potem klawiatura
    window.history.pushState({ view: 'measure', kp: false }, "");
    toggleKeypad(true); // To doda kolejny pushState {kp: true}
    
    updateStats();
}

function toggleKeypad(show) {
    const kp = document.querySelector('.keypad-holder');
    if(!kp) return;
    if(show) {
        kp.classList.remove('hidden');
        if(!window.history.state || !window.history.state.kp) {
            window.history.pushState({ view: 'measure', kp: true }, "");
        }
    } else {
        kp.classList.add('hidden');
    }
}

// Obsługa gestu WSTECZ
window.addEventListener('popstate', (e) => {
    const state = e.state;
    if (state && state.view === 'measure') {
        if (!state.kp) toggleKeypad(false);
    } else {
        showStart();
    }
});

// --- KEYPAD LOGIC ---
function keyPad() {
    const holder = document.createElement('div');
    holder.classList.add('keypad-holder');
    let counter = 1;

    for (let i = 0; i < 4; i++) {
        const row = document.createElement('div');
        row.classList.add('keypad-row');
        for (let j = 0; j < 3; j++) {
            const key = document.createElement('button');
            key.className = 'keypad-button';
            
            if (counter <= 9) { key.innerText = counter; }
            else if (counter === 10) { key.innerText = '-'; }
            else if (counter === 11) { key.innerText = '0'; }
            else if (counter === 12) { key.innerText = '.'; }

            key.onclick = (e) => keypadInputHandler(e.target.innerText);
            row.appendChild(key);
            counter++;
        }
        holder.appendChild(row);
    }

    const enterBtn = document.createElement('button');
    enterBtn.className = 'keypad-enter';
    enterBtn.innerText = 'Dodaj';
    enterBtn.onclick = () => keypadInputHandler('Dodaj');
    holder.appendChild(enterBtn);

    return holder;
}

function keypadInputHandler(value) {
    const display = document.getElementById('input-field');
    let currentVal = display.value;

    if (value === 'Dodaj' || value === 'ENTER') {
        const val = parseFloat(currentVal);
        if (!isNaN(val) && !currentVal.endsWith('.')) {
            measurements.push(val);
            display.value = '';
            updateStats();
            if (navigator.vibrate) navigator.vibrate(50);
        }
        return;
    }

    // Blokada nadmiarowego zera na początku
    if (currentVal === '0' && value !== '.') {
        display.value = value;
        return;
    }

    // Obsługa kropki
    if (value === '.') {
        if (currentVal.includes('.')) return;
        if (currentVal === "" || currentVal === "-") {
            display.value += '0.';
            return;
        }
    }

    // Obsługa miejsc po przecinku (limit 4)
    if (currentVal.includes('.')) {
        const parts = currentVal.split('.');
        if (parts[1] && parts[1].length >= 4 && value !== '-') return;
    }

    // Obsługa minusa (Toggle)
    if (value === '-') {
        if (currentVal.startsWith('-')) {
            display.value = currentVal.slice(1);
        } else {
            display.value = '-' + currentVal;
        }
        return;
    }

    display.value += value;
}

// --- STATYSTYKI I SKANER ---
function undoLast() {
    measurements.pop();
    updateStats();
}

function updateStats() {
    const n = measurements.length;
    document.getElementById('counter').innerText = `${n} / 50`;
    const log = document.getElementById('history-log');
    log.innerHTML = measurements.slice().reverse().map((v, i) => `[${n-i}] ${v.toFixed(4)}`).join('<br>');

    if(n < 2) return;

    const avg = measurements.reduce((a,b) => a+b, 0) / n;
    const sqDiffs = measurements.map(v => Math.pow(v - avg, 2));
    const std = Math.sqrt(sqDiffs.reduce((a,b) => a+b, 0) / (n - 1));
    
    const cg = (0.2 * currentStation.tol) / (4 * std);
    const cgk = (0.1 * currentStation.tol - Math.abs(avg - currentStation.master)) / (3 * std);

    document.getElementById('val-avg').innerText = avg.toFixed(4);
    document.getElementById('val-std').innerText = std.toFixed(6);
    document.getElementById('val-cg').innerText = std === 0 ? "∞" : cg.toFixed(2);
    document.getElementById('val-cgk').innerText = std === 0 ? "∞" : cgk.toFixed(2);
    document.getElementById('box-cgk').style.background = cgk >= 1.33 ? "#1e4620" : "#461e1e";
}

// Skaner (skrócony dla przejrzystości)
let videoStream = null;
function startScanner() {
    document.getElementById('scanner-view').classList.remove('hidden');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
        videoStream = s;
        document.getElementById('video').srcObject = s;
        requestAnimationFrame(scanTick);
    });
}
function stopScanner() {
    if(videoStream) videoStream.getTracks().forEach(t => t.stop());
    document.getElementById('scanner-view').classList.add('hidden');
}
function scanTick() {
    const v = document.getElementById('video');
    if(v.readyState === v.HAVE_ENOUGH_DATA) {
        const canvas = document.getElementById('canvas');
        canvas.width = v.videoWidth; canvas.height = v.videoHeight;
        const ctx = canvas.getContext('2d'); ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
        if(code) {
            stopScanner();
            if(katalogMaszyn[code.data]) selectMachine(code.data);
            return;
        }
    }
    if(!document.getElementById('scanner-view').classList.contains('hidden')) requestAnimationFrame(scanTick);
}

// Init
const sel = document.getElementById('manual-select');
for(let id in katalogMaszyn) {
    const opt = document.createElement('option'); opt.value = id; opt.innerText = katalogMaszyn[id].nazwa;
    sel.appendChild(opt);
}
function generateReport() { alert("Raport gotowy do wysyłki!"); }
</script>
</body>
</html>
