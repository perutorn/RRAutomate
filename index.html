<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a"> <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-title" content="R&R Automate">
    <title>R&R Automate</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
   /* Zmienne i Reset */
    :root {
        --bg-color: #f0f2f5;
        --text-color: #333333;
        --text-muted: #666666;
        --border-color: #dddddd;
        --primary-color: #007bff;
        --primary-text: #ffffff;
        --secondary-color: #6c757d;
        --secondary-text: #ffffff;
        --card-bg: #ffffff;
        --chart-bg: rgba(255, 0, 0, 0.1);
        --btn-active-scale: 0.97;
        --success-color: #28a745;
        
        --chart-warning-zone: rgba(255, 255, 0, 0.08);
		--chart-success-zone: rgba(34, 197, 94, 0.15);
		--chart-line-error: #ef4444;
		--chart-line-success: #22c55e;
		--chart-line-path: rgba(56, 189, 248, 0.4);
		--chart-point-normal: #ffffff;
		--chart-point-warning: #eab308;
		--chart-point-error: #ef4444;
		--chart-text: #94a3b8;
		--chart-point-border: #000000;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --primary-color: #3f9eff;
            --primary-text: #ffffff;
            --secondary-color: #495057;
            --secondary-text: #e0e0e0;
            --card-bg: #1e1e1e;
            --chart-bg: rgba(255, 80, 80, 0.15);
            
            --chart-warning-zone: rgba(234, 179, 8, 0.12);
			--chart-success-zone: rgba(34, 197, 94, 0.2);
			--chart-text: #64748b;
			--chart-point-normal: #1e1e1e;
			--chart-point-border: #ffffff;
        }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

    body { 
        background-color: var(--bg-color); 
        color: var(--text-color); 
        height: 100dvh; 
        overflow: hidden; 
        transition: background-color 0.3s ease;
    }
    
    main { height: 100%; width: 100%; position: relative; }

    section {
        display: none;
        flex-direction: column;
        padding: 20px;
        height: 100%;
        width: 100%;
        overflow-y: auto;
    }

    section.active { display: flex; animation: fadeIn 0.2s ease-out; }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    section > header{ margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
    
    .header-compact {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 8px;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
    }

    .header-title-area { flex: 1; min-width: 0; }
    .title-mini { font-size: 1.1rem !important; margin: 0 !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .counter-badge {
        background: var(--primary-color);
        color: white;
        padding: 4px 8px;
        border-radius: 6px;
        font-weight: bold;
        font-size: 0.9rem;
    }

    h2 { font-size: 1.4rem; margin: 10px 0; }
    p.centered-label { text-align: center; margin: 15px 0; }

    /* Przyciski */
    .btn {
        width: 100%;
        min-height: 60px;
        margin: 8px 0;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s, opacity 0.2s;
    }
    
    /* Poprawiony selektor (dodana kropka) */
    .btn-nav-mini {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        border: none;
        background: var(--secondary-color);
        color: var(--secondary-text);
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .btn-primary { background-color: var(--primary-color); color: var(--primary-text); }
    .btn-secondary { background-color: var(--secondary-color); color: var(--secondary-text); }
    .btn-outline { background: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); }
    .btn-success { background-color: var(--success-color); color: white; margin-top: 15px; }
    .btn-back { width: auto; min-height: 40px; padding: 0 15px; font-size: 0.9rem; }
    .btn-warning-leave{ border: 2px solid red; color: red;}
    .btn-continue { border: 2px solid green; color: green; }
    .btn.save-for-later { border 2px solid yellow; color: yellow; }
    .btn:active { transform: scale(var(--btn-active-scale)); opacity: 0.9; }

    .qr-placeholder {
        flex: 1;
        background: #000;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
    }

    /* Pomiary i Wskaźniki */
    

    .status-bar {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 5px;
        background: #1a1a1a;
        padding: 4px;
        border-radius: 8px;
        color: white;
    }

    .indicator { border-left: 3px solid #444; padding-left: 8px; }
    .indicator.critical { border-left-color: #ff4444; }
    .ind-label { font-size: 0.7rem; color: #aaa; display: block; text-transform: uppercase; }
    .ind-val { font-weight: bold; font-size: 0.9rem; }

    /* Klawiatura */
    .keypad-holder {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-top: auto;
    }

    .key-btn {
        min-height: 50px !important;
        margin: 0 !important;
        font-size: 1.2rem;
        border-radius: 8px;
    }

    .key-clear { background: #444 !important; color: #ff4444 !important; border: none; }
    .key-enter { grid-column: span 2; }

    /* Inputy */
    .input-container-rel {
        position: relative;
        width: 100%;
        margin-bottom: 15px;
    }

    .input-display {
        width: 100%;
        height: 40px;
        font-size: 1.4rem;
        text-align: center;
        border-radius: 12px;
        border: 2px solid var(--border-color);
        background: var(--card-bg);
        color: var(--text-color);
        padding-right: 60px;
    }

    .btn-undo-inline {
        position: absolute;
        right: 5px;
        top: 5px;
        bottom: 5px;
        width: 50px;
        border: none;
        background: var(--secondary-color);
        color: var(--secondary-text);
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    select {
        width: 100%;
        height: 55px;
        font-size: 1.1rem;
        margin: 15px 0;
        border-radius: 8px;
        padding: 0 10px;
        background-color: var(--card-bg);
        color: var(--text-color);
        border: 1px solid var(--border-color);
    }


    .hidden { display: none !important; }
    .text-primary { color: var(--primary-color); font-weight: bold; }
    .text-muted-sm { font-size: 0.7rem; color: var(--text-muted); display: block; }

    /* Historia */
    .history-container { margin: 5px 0 15px 0; }

    .history-log-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 5px 0;
        scrollbar-width: none;
    }

    .history-log-row::-webkit-scrollbar { display: none; }

    .history-item {
        background: var(--secondary-color);
        color: var(--secondary-text);
        padding: 4px 12px;
        border-radius: 15px;
        font-size: 0.9rem;
        white-space: nowrap;
        animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }
    
    /* Kontener grupujący dolny panel sterowania */
.control-panel {
    margin-top: auto; /* Pycha panel na sam dół sekcji */
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 10px;
    border-top: 1px solid var(--border-color);
}

/* Stała wysokość logu historii, by uniknąć przeskakiwania layoutu */
.history-container {
    margin: 0;
    height: 52px; /* Stała wysokość: label + log-row */
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.history-log-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    min-height: 32px; /* Rezerwacja miejsca na same "pigułki" z wynikami */
    padding: 2px 0;
    align-items: center;
}

/* Dopasowanie marginesów inputu i klawiatury wewnątrz panelu */
.input-container-rel {
    margin-bottom: 8px;
}

.keypad-holder {
    margin-top: 0;
    padding-bottom: 5px;
}

.chart-and-indicators-area {
	display: flex;
	flex-direction: column;
	min-height: 0;
	flex-grow: 1;
	justify-content: center;
}

#measurement-screen {
	overflow: hidden;
}

.measurement-info-box {
        margin-bottom: 15px;
        background: var(--card-bg);
        padding: 5px 10px;
        border-radius: 4px;
        border: 1px solid var(--border-color);
        color: var(--text-color);
        font-size: 0.7rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    #chart_canva {
        width: 100% !important;
        min-height: 100px !important;
        max-height: 100%;
        margin: 5px 0;
        background-color: var(--chart-bg);
        border-radius: 8px;
        flex-grow: 1;
    }
    
    
    /* Zauważ: dodałem px do 350px, bez tego media query może nie zadziałać */
@media (max-height: 700px) {
	
    .status-bar {
        padding: 2px; /* Mniejszy margines wewnętrzny całego paska */
        gap: 3px;     /* Mniejsze odstępy między wskaźnikami */
    }

     .indicator {
        padding-left: 5px; /* Węższy pasek boczny (ten kolorowy) */
    }

     .ind-label {
        font-size: 0.6rem; /* Jeszcze mniejszy napis pomocniczy */
        line-height: 1;    /* Ściśnięcie linii tekstu */
    }

     .ind-val {
        font-size: 0.75rem; /* Zmniejszenie samej wartości (np. Cg) */
    }

    /* Opcjonalnie: jeśli masz tam nagłówek sekcji, też go skompresuj */
    .header-compact {
        margin-bottom: 5px;
        padding-bottom: 4px;
    }
    
    .title-mini {
        font-size: 0.9rem !important;
    }
    
    .key-btn {
		min-height: 40px !important;
	}
}

.measurements-ind {
	justify-content: center;
	background-color: transparent;
	border: none;
}

.measurements-ind-failed {
	border: 1px solid red;
	color: white;
	background-color: red;
}

.measurements-ind-positive {
	border: 1px solid green;
	color: white;
	background-color:green;
}

#report-host {
	margin: auto;
}

/* --- Siatka i karty wyboru (Mobile-First) --- */
.sonda-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 15px;
    padding-bottom: 20px; /* Miejsce na scroll */
}

.sonda-btn {
    min-height: 80px; /* Wygodny obszar dotykowy */
    padding: 15px 10px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
}

.sonda-id {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--text-color);
}

.sonda-desc {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.2;
}


.report-header-btn {
	display: flex;
	flex-direction: row;
	gap: 10px;
}
</style>
</head>
<body>

<main>
    <section id="machine-select-screen" class="active">
    <header><h2>Krok 1: Wybór Maszyny</h2></header>
    <button class="btn btn-primary" onclick="changeScreen('qr-scanner-screen')">Skanuj kod QR</button>
    
    <p class="centered-label">Wybierz maszynę z listy:</p>
    <div id="machine-buttons-container" class="sonda-grid">
        </div>
</section>

    <section id="qr-scanner-screen">
        <header>
            <button class="btn btn-secondary" onclick="changeScreen('machine-select-screen')">Anuluj</button>
            <h2>Skanowanie QR</h2>
        </header>
        <div class="qr-placeholder">
            [ Miejsce na obraz z kamery ]
        </div>
        <button class="btn btn-primary" onclick="handleMachineSelect('M001')" style="margin-top:20px;">Symuluj odczyt M001</button>
    </section>

    <section id="probe-select-screen">
        <header>
            <button class="btn btn-secondary" onclick="changeScreen('machine-select-screen')">← Wstecz</button>
            <h2>Krok 2: Wybór sondy</h2>
            <p id="current-machine-label" class="text-primary"></p>
        </header>
        <div id="probe-buttons-container" class="sonda-grid"></div>
    </section>
    
    <section id="master-select-screen">
        <header>
            <button class="btn btn-secondary" onclick="changeScreen('probe-select-screen')">
                ← Wstecz
            </button>
            <h2>Krok 3: Wybór testu</h2>
        </header>
        <footer class="sonda-grid">
			<button class="btn btn-outline sonda-btn" onclick="handleMasterSelect('zero')">ZERO Master</button>
			<button class="btn btn-outline sonda-btn" onclick="handleMasterSelect('span')">SPAN Master</button>
		</footer>
        
    </section>
    
    <section id="test-length-screen">
		<header>
			<button class="btn btn-secondary" onclick="changeScreen('master-select-screen')">
                ← Wstecz
            </button>
            <h2>Krok 4: Długość testu</h2>
		</header>
		<button class="btn btn-outline" onclick="handleTestLengthChoice(30)">SKRÓCONY - 30 pomiarów</button>
        <button class="btn btn-outline" onclick="handleTestLengthChoice(50)">PEŁNY - 50 pomiarów</button>

    </section>

    <section id="measurement-screen">
        <header class="header-compact">
        <button class="btn-nav-mini" onclick="measurementsBack()" title="Wstecz">←</button>
        <div class="header-title-area">
            <h2 id="measurement-title" class="title-mini">Sonda: --</h2>
            <span id="active-station-name" class="text-muted-xs">Stacja</span>
        </div>
        <div class="header-counter-area">
            <span id="counter" class="counter-badge">0/50</span>
        </div>
    </header>

        <div class="status-bar">
            <div id="ind-cg" class="indicator critical"> 
                <span class="ind-label">C<sub>G</sub> (4σ)</span>
                <span id="val-cg" class="ind-val">--</span>
            </div>
            <div id="ind-cgk" class="indicator critical">
                <span class="ind-label">C<sub>GK</sub></span>
                <span id="val-cgk" class="ind-val">--</span>
            </div>
            <div class="indicator">
                <span class="ind-label">ŚREDNIA</span>
                <span id="val-avg" class="ind-val">--</span>
            </div>
        </div>
		
		<div class="chart-and-indicators-area">
			<canvas id="chart_canva"></canvas>
			<div id="measurement-info" class="measurement-info-box"></div>
		</div>
		
        <div class="control-panel">
			<div class="history-container">
				<span class="text-muted-sm">Ostatnie odczyty:</span>
				<div id="history-log" class="history-log-row">
					</div>
			</div>

			<div id="input-container" class="input-container-rel">
				<input type="text" id="input-field" class="input-display" placeholder="0.000" readonly>
				<button id="undo-btn" class="btn-undo-inline" onclick="undoLast()" title="Cofnij">⟲</button>
			</div>

			<div id="keypad" class="keypad-holder"></div>
		</div>
        
        <button id="btn-final" class="btn btn-success hidden" onclick="raportPage()">
            ZAKOŃCZ I WYŚLIJ RAPORT
        </button>
    </section>
    
    <section id="confirm-leave-screen">
		<header>
            <h2>Przerwać pomiary?</h2>
        </header>
        <footer>
			<button class="btn btn-outline btn-warning-leave" onclick="resetAppToStart()">Przerwij</button>
			<button class="btn btn-outline btn-continue" onclick="changeScreen('measurement-screen')">Wróć do pomiarów</button>
			<button class="btn btn-outline" onclick="raportPage()">Wyślij raport</button>
		</footer>
    </section>
    
    <section id="raport-screen">
		<header>
			<h2>Raport</h2>
			<div class="report-header-btn" >
				<button onclick="changeScreen('measurement-screen')" class="btn btn-secondary btn-back">Powrót</button>
				<button onclick="changeScreen('confirm-leave-screen')" class="btn btn-secondary btn-back">Odrzuć</button>
				<button onclick="handleFinalizeAndShare()" class="btn btn-primary">Udostępnij raport</button>
            </div>
		</header>
		<div id="report-host" style="height: calc(100% - 70px); overflow-y: auto; padding: 10px;"></div>
    </section>
    	
	<section id="session-expired-screen" class="screen">
    <div class="card shadow" style="text-align: center; padding: 2rem;">
        <div id="expired-icon" style="font-size: 3rem; margin-bottom: 1rem;">🕒</div>
        <h2 id="expired-title" style="color: var(--primary-color);">Sesja wygasła</h2>
        <p id="expired-desc" style="margin-bottom: 2rem; color: var(--text-muted);"></p>
        
        <div id="expired-actions" style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btn-save-expired" class="btn btn-success btn-block" style="display: none;" onclick="handleExpiredDownload()">
                💾 Pobierz zapomniany raport
            </button>
            
            <button class="btn btn-primary btn-block" onclick="handleStartNewAfterExpired()">
                🆕 Rozpocznij nowy pomiar
            </button>
        </div>
    </div>
</section>
</main>

<script>
    // TWOJE DANE
    const LOCALSTORAGE_KEY = 'randr-session';
    
    const katalogMaszyn = {
    "M001": {
        nazwa: "RETURN SPRING SNR ASSY",
        nr: "A2-SUB-0020",
        sondy: {
            "LF": { nazwa_cechy: "SWASH PLATE THICKNESS", zero: { rf: 0.02, graduation: 0.0001, master: 0 }, span: { rf: 0.02, graduation: 0.0001, master: 1.6 } },
            "RF": { nazwa_cechy: "SWASH PLATE THICKNESS", zero: { rf: 0.02, graduation: 0.0001, master: 0 }, span: { rf: 0.02, graduation: 0.0001, master: 1.6 } },
            "LB": { nazwa_cechy: "SWASH PLATE THICKNESS", zero: { rf: 0.02, graduation: 0.0001, master: 0 }, span: { rf: 0.02, graduation: 0.0001, master: 1.6 } },
            "RB": { nazwa_cechy: "SWASH PLATE THICKNESS", zero: { rf: 0.02, graduation: 0.0001, master: 0 }, span: { rf: 0.02, graduation: 0.0001, master: 1.6 } },
            "SNR": { nazwa_cechy: "SNR HEIGHT", zero: { rf: 0.6, graduation: 0.001, master: 0 }, span: { rf: 0.6, graduation: 0.001, master: 2.0 } },
            "PinA": { nazwa_cechy: "PIN HEIGHT A", zero: { rf: 0.2, graduation: 0.001, master: 0 }, span: { rf: 0.2, graduation: 0.001, master: 1.5 } },
            "PinB": { nazwa_cechy: "PIN HEIGHT B", zero: { rf: 0.2, graduation: 0.001, master: 0 }, span: { rf: 0.2, graduation: 0.001, master: 1.5 } }
        }
    }
};

    // STAN SESJI I ZMIENNE POMIAROWE
    // Zastąp obecny obiekt session tym:
	let session = {
		date: null,
		machineID: null,
		machineNr: null,
		machineName: null,
		probeID: null, 
		probeName: null,
		masterType: null,
		masterParams: null, 
		testLength: 0, 
		grad: 0, 
		measurements: [], 
		idealMeasurements: [],
		currentScreen: 'machine-select-screen' // Domyślny ekran startowy
	};

    // INICJALIZACJA
   function init() {
    initKeypad();
    renderMachineButtons(); 

    const savedData = localStorage.getItem(LOCALSTORAGE_KEY);
    if (!savedData) {
        changeScreen('machine-select-screen');
        return;
    }

    try {
        const parsed = JSON.parse(savedData);
		const sessionDate = new Date(parsed?.date).getTime() || 0;
        const now = new Date().getTime();
        const oneHour = 1000 * 10;

        if (now - sessionDate > oneHour) {
            // SCENARIUSZ 1: Brak pomiarów -> czyścimy i idziemy do startu
            if (!parsed.measurements || parsed.measurements.length === 0) {
                localStorage.removeItem(LOCALSTORAGE_KEY);
                console.log('tutaj');
                resetSessionObject();
                changeScreen('machine-select-screen');
            } 
            // SCENARIUSZ 2 i 3: Są dane (przerwane lub kompletne)
            else {
                Object.assign(session, parsed); // Wczytujemy dane do obiektu sesji
                
                const isComplete = session.measurements.length >= session.testLength;
                
                // Ustawiamy treści na ekranie informacyjnym
                const descEl = document.getElementById('expired-desc');
                if (isComplete) {
                    descEl.innerHTML = `Znaleziono <b>ukończony</b> raport sprzed godziny (${session.measurements.length} pomiarów). <br>Możesz go zapisać przed usunięciem.`;
                } else {
                    descEl.innerHTML = `Twoja sesja sprzed godziny była <b>niekompletna</b> (${session.measurements.length}/${session.testLength} pomiarów) i została wygaszona.`;
                }
                
                // Pokazujemy/ukrywamy przycisk zapisu
                document.getElementById('btn-save-expired').style.display = isComplete ? 'block' : 'none';
                
                changeScreen('session-expired-screen');
            }
            return;
        }

        // Jeśli sesja jest świeża (poniżej godziny) - wznawiamy pracę
        Object.assign(session, parsed);

        changeScreen('machine-select-screen');

}

    function calculateStats(data, nominal, tolerance) {
		const n = data.length;
		if (n < 2) return null;

		const avg = data.reduce((a, b) => a + b, 0) / n;
		const variance = data.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b, 0) / (n - 1);
		const std = Math.sqrt(variance);

		const epsilon = session.masterParams.graduation / 10
		if (std < epsilon ) return { avg, cg: -9.99, cgk: -9.99, std: 0 };

		const cg = (0.2 * tolerance) / (4 * std);
		const cgk = (0.1 * tolerance - Math.abs(nominal - avg)) / (2 * std);

		return { avg, cg, cgk, std };
	}

	function getPrecision(graduation){
		if (graduation >= 1) return 0;
		const grad = graduation.toString().split('.');
		return grad.length > 1? grad[1].length: 0;
	}

	function prepareMeasurements() {
		if (session.masterParams) {
			session.measurements = [];
			session.idealMeasurements = new Array(session.testLength).fill(session.masterParams.master);
			
		}
	}
		
	function updateStats() {
		
		const n = session.measurements.length;
		const m = session.masterParams.master;
		const t = session.masterParams.rf; // Z katalogu maszyn rf traktujemy jako pole tolerancji
		const l = session.testLength;
		const f = session.grad;

		// Aktualizacja nagłówków
		document.getElementById('active-station-name').innerText = `${session.machineID} | ${session.probeID}`;
		document.getElementById('counter').innerText = `${n} / ${l}`;
		
		const mInfo = document.getElementById('measurement-info');
		
		// Historia z kolorowaniem (naprawiony brakujący colorMeasurment)
		const log = document.getElementById('history-log');
		log.innerHTML = session.measurements.slice().reverse().map((v) => {
			const diff = Math.abs(v - m);
			let color = '#333';
			if (diff > t/2) color = '#ef4444'; // Czerwony - poza tolerancją
			else if (diff > (t * 0.1)) color = '#eab308'; // Żółty - ostrzeżenie
			else color = '#22c55e'; // Zielony - w punkt

			return `<div class="history-item" style="color: ${color}; font-weight: bold; margin-bottom: 2px;">${v.toFixed(f)}</div>`;
		}).join('');

		// --- OBLICZENIA ---
		const stats = calculateStats(session.measurements, m, t);
		const ideal = calculateStats(session.idealMeasurements, m, t);

		if (stats) {
			document.getElementById('val-avg').innerText = stats.avg.toFixed(f);
			document.getElementById('val-cg').innerText = stats.std === 0 ? "∞" : stats.cg.toFixed(2);
			document.getElementById('val-cgk').innerText = stats.std === 0 ? "∞" : stats.cgk.toFixed(2);

			// Kolory pigułek (zmieniamy kolor lewej krawędzi)
			document.getElementById('ind-cg').style.borderLeftColor = stats.cg >= 1.33 ? '#28a745' : '#ff4444';
			document.getElementById('ind-cgk').style.borderLeftColor = stats.cgk >= 1.33 ? '#28a745' : '#ff4444';
		} else {
			// Czyszczenie jeśli brak danych (np. po użyciu przycisku "Wstecz")
			document.getElementById('val-avg').innerText = "--";
			document.getElementById('val-cg').innerText = "--";
			document.getElementById('val-cgk').innerText = "--";
		}
		
		// Sufit (jeśli element istnieje)
		if (ideal && mInfo && session.measurements.length > 1) {
			const cg = ideal.cg.toFixed(2);
			const cgk = ideal.cgk.toFixed(2);
			
			const cgClass = cg < 1.33? "measurements-ind measurements-ind-failed" : "measurements-ind measurements-ind-positive";
			const cgkClass = cgk < 1.33? "measurements-ind measurements-ind-failed" : "measurements-ind measurements-ind-positive";

			
			mInfo.innerHTML = `
				<div class="${cgClass}">Max C<sub>g</sub>: ${cg}</div>
				<div class="${cgkClass}">Max C<sub>gk</sub>: ${cgk}</div>
			`;
		} else if (mInfo) {
			mInfo.innerHTML = `<div class="measurements-ind">Oczekiwanie na dane...</div>`;
		}
		
		
		// Sterowanie widocznością interfejsu (blokada po 50 pomiarach)
		const isFinished = n >= 6; // <- zmienic na session.testLength
		document.getElementById('input-container').classList.toggle('hidden', isFinished);
		document.getElementById('keypad').classList.toggle('hidden', isFinished);
		document.getElementById('btn-final').classList.toggle('hidden', !isFinished);
		
		drawChart();
	}
	
/**
 * Pobiera kolory zdefiniowane w CSS. 
 * Robimy to RAZ na początku rysowania, by nie obciążać przeglądarki w pętlach.
 */
function getChartTheme() {
    const s = getComputedStyle(document.documentElement);
    return {
        warningZone: s.getPropertyValue('--chart-warning-zone').trim(),
        successZone: s.getPropertyValue('--chart-success-zone').trim(),
        lineError:   s.getPropertyValue('--chart-line-error').trim(),
        lineSuccess: s.getPropertyValue('--chart-line-success').trim(),
        linePath:    s.getPropertyValue('--chart-line-path').trim(),
        pointNormal: s.getPropertyValue('--chart-point-normal').trim(),
        pointWarn:   s.getPropertyValue('--chart-point-warning').trim(),
        pointError:  s.getPropertyValue('--chart-point-error').trim(),
        textMuted:   s.getPropertyValue('--chart-text').trim(),
        pointBorder: s.getPropertyValue('--chart-point-border').trim()
    };
}

function drawChart(canvasId = 'chart_canva') {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    const theme = getChartTheme(); // Pobieramy paczkę kolorów
    
    const w = canvas.width = canvas.offsetWidth;
    const h = canvas.height = canvas.offsetHeight || 150; 
    
    ctx.clearRect(0, 0, w, h);
    
    // Dane z sesji
    const m = session.masterParams.master;
    const t = session.masterParams.rf;
    const measurements = session.measurements || [];
    
    const points = measurements.length > 0 ? measurements : [m];
    const minVal = Math.min(...points, m - t * 0.5);
    const maxVal = Math.max(...points, m + t * 0.5);
    const rangeY = (maxVal - minVal) + ((maxVal - minVal) * 0.2 || 0.01);
    const midPoint = (maxVal + minVal) / 2;

    const yScale = (val) => h/2 - ((val - midPoint) / rangeY) * h;
    const xStep = w / 50;
    const greenZoneT = t * 0.1;

    // --- 1. STREFY TŁA ---
    ctx.fillStyle = theme.warningZone;
    ctx.fillRect(0, yScale(m + t/2), w, yScale(m - t/2) - yScale(m + t/2));

    ctx.fillStyle = theme.successZone;
    ctx.fillRect(0, yScale(m + greenZoneT), w, yScale(m - greenZoneT) - yScale(m + greenZoneT));

    // --- 2. LINIE REFERENCYJNE ---
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = theme.lineError;
    ctx.beginPath(); 
    ctx.moveTo(0, yScale(m + t/2)); ctx.lineTo(w, yScale(m + t/2)); 
    ctx.moveTo(0, yScale(m - t/2)); ctx.lineTo(w, yScale(m - t/2)); 
    ctx.stroke();

    ctx.setLineDash([]);
    ctx.strokeStyle = theme.lineSuccess;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, yScale(m)); ctx.lineTo(w, yScale(m)); ctx.stroke();

    // --- 3. LINIA ŁĄCZĄCA PUNKTY ---
    if (measurements.length > 1) {
        ctx.strokeStyle = theme.linePath;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        measurements.forEach((v, i) => {
            const x = i * xStep + 10;
            const y = yScale(v);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    // --- 4. PUNKTY POMIAROWE ---
    measurements.forEach((v, i) => {
        const x = i * xStep + 10;
        const y = yScale(v);
        const diff = Math.abs(v - m);

        if (diff > t/2) ctx.fillStyle = theme.pointError;      
        else if (diff > greenZoneT) ctx.fillStyle = theme.pointWarn; 
        else ctx.fillStyle = theme.pointNormal;                 

        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = theme.pointBorder;
        ctx.lineWidth = 1;
        ctx.stroke();
    });

    // --- 5. ETYKIETY ---
    ctx.font = "8px monospace";
    ctx.textAlign = "right";
    ctx.fillStyle = theme.textMuted;
    ctx.fillText((m + t/2).toFixed(3), w - 5, yScale(m + t/2) - 5);
    ctx.fillText((m - t/2).toFixed(3), w - 5, yScale(m - t/2) + 12);
    ctx.fillStyle = theme.lineSuccess;
    ctx.fillText("MASTER: " + m.toFixed(3), w - 5, yScale(m) - 5);
}

function generateSVGChart() {
    const data = session.measurements;
    if (!data || data.length === 0) return '<svg viewBox="0 0 600 300"><text x="300" y="150" text-anchor="middle" font-family="sans-serif">Brak danych</text></svg>';

    const m = session.masterParams.master;
    const t = session.masterParams.rf;
    const grad = session.grad || 3;
    
    // Obliczanie granic tolerancji
    const topT = m + t / 2;
    const botT = m - t / 2;

    const w = 600;
    const h = 300;
    const paddingX = 60; // Miejsce po lewej na napisy
    const paddingY = 40; // Miejsce góra/dół

    // Ustalanie skali osi Y (uwzględnia tolerancję i odchylenia pomiarów)
    const allValues = [...data, topT, botT];
    const rawMin = Math.min(...allValues);
    const rawMax = Math.max(...allValues);
    const margin = (rawMax - rawMin) * 0.1 || t * 0.1; // 10% marginesu na skali

    const minVal = rawMin - margin;
    const maxVal = rawMax + margin;
    const rangeY = maxVal - minVal;

    // Funkcje skalujące punkty na piksele (uwaga: w SVG Y=0 to góra ekranu)
    const getX = (i) => paddingX + (i / Math.max(1, data.length - 1)) * (w - 2 * paddingX);
    const getY = (val) => paddingY + ((maxVal - val) / rangeY) * (h - 2 * paddingY);

    let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="background:#fff; border: 1px solid #e5e7eb; border-radius: 4px;">`;

    // Zielone tło strefy tolerancji
    const yTop = getY(topT);
    const yBot = getY(botT);
    svg += `<rect x="${paddingX}" y="${yTop}" width="${w - 2 * paddingX}" height="${yBot - yTop}" fill="#f0fdf4" />`;

    // Linie tolerancji i mastera
    const yMaster = getY(m);
    svg += `<line x1="${paddingX}" y1="${yTop}" x2="${w - paddingX}" y2="${yTop}" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,5" />`;
    svg += `<line x1="${paddingX}" y1="${yBot}" x2="${w - paddingX}" y2="${yBot}" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,5" />`;
    svg += `<line x1="${paddingX}" y1="${yMaster}" x2="${w - paddingX}" y2="${yMaster}" stroke="#22c55e" stroke-width="1.5" />`;

    // Podpisy osi Y (Wartości liczbowe)
    const textStyle = `font-family:sans-serif; font-size:11px; font-weight:bold;`;
    svg += `<text x="${paddingX - 8}" y="${yTop + 4}" style="${textStyle}" text-anchor="end" fill="#ef4444">${topT.toFixed(grad)}</text>`;
    svg += `<text x="${paddingX - 8}" y="${yBot + 4}" style="${textStyle}" text-anchor="end" fill="#ef4444">${botT.toFixed(grad)}</text>`;
    svg += `<text x="${paddingX - 8}" y="${yMaster + 4}" style="${textStyle}" text-anchor="end" fill="#22c55e">${m.toFixed(grad)}</text>`;

    // Linia łącząca pomiary
    if (data.length > 1) {
        const points = data.map((v, i) => `${getX(i)},${getY(v)}`).join(" ");
        svg += `<polyline points="${points}" fill="none" stroke="#3b82f6" stroke-width="2" />`;
    }

    // Punkty pomiarowe z rozróżnieniem kolorów (czerwony poza zakresem)
    data.forEach((v, i) => {
        const isOut = v > topT || v < botT;
        svg += `<circle cx="${getX(i)}" cy="${getY(v)}" r="4" fill="${isOut ? '#ef4444' : '#3b82f6'}" stroke="#fff" stroke-width="1.5" />`;
    });

    svg += `</svg>`;
    return svg;
}

function generateSVGHistogram() {
    const data = session.measurements;
    if (!data || data.length === 0) return '';

    const w = 600;
    const h = 250;
    const paddingX = 40;
    const paddingY = 30;
    const binsCount = 10;

    let min = Math.min(...data);
    let max = Math.max(...data);

    // Zabezpieczenie: jeśli wszystkie pomiary są identyczne, tworzymy sztuczny zakres oparty na tolerancji
    if (min === max) {
        const t = session.masterParams.rf || 0.1;
        min = min - t/2;
        max = max + t/2;
    }

    const range = max - min;
    const bins = new Array(binsCount).fill(0);

    // Poprawne mapowanie pomiarów do koszyków (bins)
    data.forEach(v => {
        let idx = Math.floor(((v - min) / range) * binsCount);
        if (idx === binsCount) idx--; // Zabezpieczenie dla największej wartości granicznej
        bins[idx]++;
    });

    // Najwyższy słupek będzie odniesieniem do wysokości (min 1, żeby nie dzielić przez zero)
    const maxBin = Math.max(...bins, 1); 
    const barW = (w - 2 * paddingX) / binsCount;

    let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="background:#fff; border: 1px solid #e5e7eb; border-radius: 4px;">`;

    // Główna oś pozioma X
    svg += `<line x1="${paddingX}" y1="${h - paddingY}" x2="${w - paddingX}" y2="${h - paddingY}" stroke="#cbd5e1" stroke-width="2" />`;

    // Generowanie słupków
    bins.forEach((count, i) => {
        const barH = (count / maxBin) * (h - 2 * paddingY);
        const x = paddingX + i * barW;
        const y = h - paddingY - barH;

        // Pojedynczy słupek
        svg += `<rect x="${x + 2}" y="${y}" width="${barW - 4}" height="${barH}" fill="#64748b" />`;

        // Tekst nad słupkiem pokazujący ilość sztuk (tylko jeśli > 0)
        if (count > 0) {
            svg += `<text x="${x + barW / 2}" y="${y - 5}" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#475569">${count}</text>`;
        }

        // Wartości pod osią X (środek przedziału) - wypisujemy co drugi, żeby było czytelnie
        if (i % 2 === 0) {
            const binMidValue = min + (i + 0.5) * (range / binsCount);
            svg += `<text x="${x + barW / 2}" y="${h - paddingY + 16}" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#64748b">${binMidValue.toFixed(session.grad || 3)}</text>`;
        }
    });

    svg += `</svg>`;
    return svg;
}

async function handleFinalizeAndShare() {
    const reportHtml = generateFullHTML();
    const blob = new Blob([reportHtml], { type: 'text/html' });
    const fileName = `Raport_${session.machineNr}_${new Date().toISOString().slice(0,10)}.html`;

    // KROK 1: Zapis na dysk (Plan B)
    // To dzieje się lokalnie, nie wymaga internetu.
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);

    // KROK 2: Udostępnianie (Plan A)
    // Mała pauza, żeby system "przetrawił" pobieranie
    await new Promise(r => setTimeout(r, 500));

    if (navigator.share) {
        const file = new File([blob], fileName, { type: 'text/html' });
        try {
            await navigator.share({
                files: [file],
                title: 'Raport SPA',
                text: `Przesyłam raport dla maszyny: ${session.machineNr}`
            });
            // Jeśli tu dotarliśmy, okno share się otworzyło.
            // Możemy teraz wyświetlić prosty komunikat:
            alert("Raport zapisano na urządzeniu i wywołano menu wysyłki.");
        } catch (err) {
            // Jeśli użytkownik anulował share, plik i tak już jest na dysku (z kroku 1)
            console.log("Share anulowany, ale plik pobrany.");
        }
    }
    
    if (confirm("Czy chcesz zakończyć sesję i wyczyścić dane z urządzenia?")) {
        localStorage.removeItem(LOCALSTORAGE_KEY);
        location.reload();
    }
}

window.addEventListener('keydown', (event) => {
    const key = event.key.toUpperCase();

    // 1. Cyfry, kropka i minus
    if (/^[0-9.\-]$/.test(key)) {
        handleInput(key);
    } 
    // 2. Enter -> DODAJ POMIAR
    else if (key === 'Enter') {
        event.preventDefault(); // Zapobiega np. wysłaniu formularza
        handleInput('ENTER');
    } 
    // 3. Backspace -> funkcja C (usuwanie znaku)
    else if (key === 'Backspace') {
        handleInput('C');
    }
    // 4. Escape -> może służyć do czyszczenia całego pola (opcjonalnie)
    else if (key === 'Escape') {
        document.getElementById('input-field').value = '';
    }
    else if( key === 'U') {
		undoLast();
	}
});
