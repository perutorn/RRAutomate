<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a"> <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-title" content="R&R Automate">
    <title>R&R Automate</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #0078d7; --success: #28a745; --danger: #dc3545; --text: #eee;}
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        /* Ekran startowy */
        .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #333; }

        /* Panel pomiarowy - Układ warstwowy */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #counter { font-weight: bold; color: var(--accent); }

        /* Statystyki jako "Pigułki" */
        .status-bar { display: flex; gap: 4px; margin-bottom: 5px; }
        .indicator { flex: 1; padding: 4px; border-radius: 8px; text-align: center; background: #222; border: 1px solid #444; transition: 0.3s; }
        .ind-label { font-size: 0.6rem; color: #888; display: block; text-transform: uppercase; }
        .ind-val { font-size: 1rem; font-weight: bold; }
        .pass { background: #1e4620 !important; border-color: var(--success) !important; }
        .fail { background: #461e1e !important; border-color: var(--danger) !important; }

        /* Wykres */
        /* Wykres z półprzezroczystym tłem dla stref */
		#chart_canva { width: 100%;  height: 30dvh; border-radius: 8px; border: 1px solid #333;  margin-bottom: 8px; background-color: rgba(255, 0, 0, 0.1); 
}

        /* Historia pozioma */
        /*.history-row { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; margin-bottom: 8px; font-family: monospace; } */
        .hist-item { background: #333; padding: 4px 5px; border-radius: 15px; font-size: 0.85rem; flex-shrink: 0; border: 1px solid #444; }
        
        .history-row {background-color: rgba(255,255,255, 0.1); display: flex; gap: 6px; overflow-x: auto; padding: 10px 5px; margin-bottom: 8px;-webkit-overflow-scrolling: touch; min-height: 4dvh; align-items: center;}
        /* Ukrycie paska przewijania (scrollbara), żeby nie szpecił */
        .history-row::-webkit-scrollbar {display: none;}
        .input-container { position: relative; margin-bottom: 10px; }
        #input-field { width: 100%; padding: 15px; font-size: 1.4rem; background: #000; color: #00ff00; border: 2px solid var(--accent); border-radius: 10px; text-align: center; box-sizing: border-box; }
        .btn-undo { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #333; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; }

        .keypad-holder { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #1a1a1a; padding: 8px; margin-bottom: 20px; border-radius: 10px; flex-grow: 1; }
        .key-btn { padding: 10px; font-size: 1.2rem; background: #333; color: white; border: none; border-radius: 6px; touch-action: manipulation; }
        .key-btn:active { background: var(--accent); }
        .key-enter { grid-column: span 3; background: var(--success); font-weight: bold; padding: 15px; }

        /* Skaner */
        #scanner-view { position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="view-start">
    <h2 style="text-align:center">R&R Automate</h2>
    <button class="btn" onclick="startScanner()">SKANUJ KOD QR</button>
    <div class="card">
        <select id="manual-select" class="btn" style="background:#333" onchange="selectMachine(this.value)">
            <option value="">-- Wybierz stację --</option>
        </select>
    </div>
</div>

<div id="view-station" class="hidden">
    <button onclick="showStart()" style="color:var(--accent); background:none; border:none; padding:10px">← Powrót</button>
    <h3 id="selected-machine-name">Maszyna</h3>
    <div id="stations-list"></div>
</div>

<div id="view-measure" class="hidden">
    <div class="header-row">
		<button onclick="showViewStation()" style="color:var(--accent); background:none; border:none; padding:10px">← Powrót</button>
        <span id="active-station-name" style="font-size: 0.7rem; color: #bbb;">Stacja</span>
        <span id="counter">0 / 50</span>
    </div>

    <div class="status-bar">
        <div class="indicator" id="ind-cg"><span class="ind-label">Cg (4σ)</span><span class="ind-val" id="val-cg">-</span></div>
        <div class="indicator" id="ind-cgk"><span class="ind-label">Cgk</span><span class="ind-val" id="val-cgk">-</span></div>
        <div class="indicator"><span class="ind-label">Średnia</span><span class="ind-val" id="val-avg" style="font-size: 0.9rem;">-</span></div>
    </div>

    <canvas id="chart_canva"></canvas>

    <div class="history-row" id="history-log"></div>

    <div class="input-container">
        <input type="text" id="input-field" placeholder="0.000" readonly>
        <button class="btn-undo" onclick="undoLast()">⟲</button>
    </div>

    <div class="keypad-holder" id="keypad">
        </div>
    
    <button id="btn-final" class="btn hidden" style="background: var(--success); margin-top: 10px;" onclick="generateReport()">ZAKOŃCZ I WYŚLIJ RAPORT</button>
</div>

<div id="scanner-view" class="hidden">
    <video id="video" autoplay playsinline></video>
    <button onclick="stopScanner()" style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); padding:15px; border-radius:10px;">ANULUJ</button>
</div>

<script>
const katalogMaszyn = {
    "M001": {
        nazwa: "A2-SUB-0020",
        stacje: [
            { id: "s1", nazwa: "Pin A height", tol: 0.6, master: 0.000 },
            { id: "s2", nazwa: "Pin B height", tol: 1.0, master: 2.000 },
            { id: "s3", nazwa: "Swash plate", tol: 0.05, master: 20.000 }
        ]
    }
};

let currentStation = null;
let machineAndStation = '';
let measurements = [];

// --- SKANER (jsQR) ---
let videoStream = null;
function startScanner() {
    document.getElementById('scanner-view').classList.remove('hidden');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
        videoStream = s;
        document.getElementById('video').srcObject = s;
        requestAnimationFrame(scanTick);
    });
}

function stopScanner() {
    if(videoStream) videoStream.getTracks().forEach(t => t.stop());
    document.getElementById('scanner-view').classList.add('hidden');
}

function scanTick() {
    const v = document.getElementById('video');
    if(v.readyState === v.HAVE_ENOUGH_DATA) {
        const canvas = document.getElementById('canvas');
        canvas.width = v.videoWidth; canvas.height = v.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height);
        if(code) {
            stopScanner();
            if(katalogMaszyn[code.data]) selectMachine(code.data);
            else alert("Nieznana maszyna: " + code.data);
            return;
        }
    }
    if(!document.getElementById('scanner-view').classList.contains('hidden')) requestAnimationFrame(scanTick);
}

// Inicjalizacja Keypada
function initKeypad() {
    const kp = document.getElementById('keypad');
    kp.innerHTML = ''; 
    kp.style.display = 'grid';
    kp.style.gridTemplateColumns = 'repeat(3, 1fr)';
    kp.style.gap = '5px';
    
    // Standardowe klawisze
    const keys = [
        '1','2','3',
        '4','5','6',
        '7','8','9',
        '-','0','.'
    ];

    keys.forEach(k => {
        const b = document.createElement('button');
        b.className = 'key-btn';
        b.innerText = k;
        b.onclick = () => handleInput(k);
        kp.appendChild(b);
    });

    // Przycisk C (1 kolumna)
    const cBtn = document.createElement('button');
    cBtn.className = 'key-btn';
    cBtn.innerText = 'C';
    cBtn.style.background = '#444';
    cBtn.style.color = '#ff4444';
    cBtn.onclick = () => handleInput('C');
    kp.appendChild(cBtn);

    // Przycisk DODAJ (2 kolumny)
    const ent = document.createElement('button');
    ent.className = 'key-btn key-enter';
    ent.innerText = 'DODAJ POMIAR';
    ent.style.gridColumn = 'span 2'; 
    ent.onclick = () => handleInput('ENTER');
    kp.appendChild(ent);
}

function handleInput(val) {
    const disp = document.getElementById('input-field');
    
    if (val === 'C') {
        disp.value = disp.value.slice(0, -1);
        return;
    }

    if (val === 'ENTER') {
        const v = parseFloat(disp.value);
        if (!isNaN(v)) {
            measurements.push(v);
            disp.value = '';
            updateStats();
            if (navigator.vibrate) navigator.vibrate(40);
        }
        return;
    }

    if (val === '-') {
        if (disp.value.startsWith('-')) {
            disp.value = disp.value.slice(1);
        } else {
            disp.value = '-' + disp.value;
        }
        return;
    }

    if (val === '.' && disp.value.includes('.')) return;
    
    if (disp.value.length < 10) {
        disp.value += val;
    }
}

function colorMeasurment(value) {
	const m = currentStation.master;
	const t = currentStation.tol;
	const d = Math.abs(value - m);
	
	if (d > t/2) return varColor('--danger')
	else if (d > t*0.1) return '#FFD700'
	else return null;
}

function updateStats() {
    const n = measurements.length;
    document.getElementById('active-station-name').innerText = machineAndStation;
    document.getElementById('counter').innerText = `${n} / 50`;
    
    // Historia
    const log = document.getElementById('history-log');
    log.innerHTML = measurements.slice().reverse().map((v, i) => {
					const color = colorMeasurment(v);
					if (color)
						return `<div class="hist-item" style="color: ${color}">${v.toFixed(3)}</div>`
					else
						return `<div class="hist-item" style="color: ${color}">${v.toFixed(3)}</div>`;
				}).join('');

    if(n >= 2) {
        const avg = measurements.reduce((a,b)=>a+b,0)/n;
        const std = Math.sqrt(measurements.map(x=>Math.pow(x-avg,2)).reduce((a,b)=>a+b,0)/(n-1));
        
        // Formuły z arkusza Sanden (0.2*RF / 4*Sg)
        const cg = (0.2 * currentStation.tol) / (4 * std);
        const cgk = (0.1 * currentStation.tol - Math.abs(currentStation.master - avg)) / (2 * std);

        document.getElementById('val-avg').innerText = avg.toFixed(3);
        document.getElementById('val-cg').innerText = std === 0 ? "∞" : cg.toFixed(2);
        document.getElementById('val-cgk').innerText = std === 0 ? "∞" : cgk.toFixed(2);

        // Kolory pigułek
        document.getElementById('ind-cg').className = `indicator ${cg >= 1.33 ? 'pass' : 'fail'}`;
        document.getElementById('ind-cgk').className = `indicator ${cgk >= 1.33 ? 'pass' : 'fail'}`;
    }

    if(n >= 10) {
        document.getElementById('keypad').classList.add('hidden');
        document.getElementById('btn-final').classList.remove('hidden');
    } else {
        document.getElementById('keypad').classList.remove('hidden');
        document.getElementById('btn-final').classList.add('hidden');
    }
    
    drawChart();
}


function drawChart() {
    const canvas = document.getElementById('chart_canva');
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.offsetWidth;
    const h = canvas.height = canvas.offsetHeight;
    
    ctx.clearRect(0, 0, w, h);
    
    const m = currentStation.master;
    const t = currentStation.tol;
    
    // Skalowanie Y: Master na środku, +/- 1.2 * Tolerancja dla zapasu wizualnego
    //const rangeY = t * 0.9;
    // Wewnątrz drawChart():
let minVal = Math.min(...measurements, m - t*0.1);
let maxVal = Math.max(...measurements, m + t*0.1);
let buffer = (maxVal - minVal) * 0.2; // Dodaj 20% marginesu

const rangeY = (maxVal - minVal) + buffer;
const midPoint = (maxVal + minVal) / 2;

// Nowy yScale uwzględniający dynamiczny środek
const yScale = (val) => h/2 - ((val - midPoint) / rangeY) * h;
    //const yScale = (val) => h/2 - ((val - m) / rangeY) * (h/2);

    // --- RYSOWANIE STREF (TŁA) ---
    // 1. Strefa Czerwona (Tło domyślne canvasa, nic nie rysujemy)

    // 2. Strefa Żółta (Obszar tolerancji technicznej)
    ctx.fillStyle = 'rgba(255, 255, 0, 0.1)'; // Przezroczysty żółty
    ctx.fillRect(0, yScale(m + t/2), w, yScale(m - t/2) - yScale(m + t/2));

    // 3. Strefa Zielona (Wymaganie Cg > 1.33)
    // Reguła: Cg > 1.33 oznacza, że 4*Std nie może przekraczać 20% Tolerancji (T/5)
    // Pasek zielony to +/- 10% Tolerancji wokół Mastera
    const greenZoneT = t * 0.1; 
    ctx.fillStyle = 'rgba(0, 255, 0, 0.2)'; // Przezroczysty zielony
    ctx.fillRect(0, yScale(m + greenZoneT), w, yScale(m - greenZoneT) - yScale(m + greenZoneT));


    // --- RYSOWANIE LINII ---
    // Linie tolerancji detalu (Czerwone)
    ctx.strokeStyle = '#880000'; ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, yScale(m + t/2)); ctx.lineTo(w, yScale(m + t/2)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, yScale(m - t/2)); ctx.lineTo(w, yScale(m - t/2)); ctx.stroke();

    // Linia Master (Zielona)
    ctx.strokeStyle = varColor('--success'); ctx.setLineDash([]); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, yScale(m)); ctx.lineTo(w, yScale(m)); ctx.stroke();


    // --- RYSOWANIE PUNKTÓW (POMIARÓW) ---
    ctx.fillStyle = varColor('--accent');
    const xStep = w / 50;
measurements.forEach((v, i) => {
    const x = i * xStep + 5;
    const y = yScale(v);
    
    const diff = Math.abs(v - m);
    const greenZoneT = t * 0.1; // Ta sama logika co przy rysowaniu paska

    if (diff > t/2) {
        ctx.fillStyle = '#FF4444'; // Wyrazisty czerwony
    } else if (diff > greenZoneT) {
        ctx.fillStyle = '#FFD700'; // Wyrazisty złoty/żółty
    } else {
        ctx.fillStyle = '#FFFFFF'; // Biały - idealnie widoczny na zielonym tle
    }
    
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, 7); // Zwiększyłem promień z 3 na 4 dla lepszej widoczności
    ctx.fill();
    
    // Opcjonalnie: obwódka wokół kropki, żeby nie "puchła" na tle
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
});
    
    
    // Ustawienia czcionki dla etykiet
ctx.fillStyle = "#888"; 
ctx.font = "10px monospace";
ctx.textAlign = "right";

// Etykieta Górnej Tolerancji
ctx.fillText((m + t/2).toFixed(3), w - 5, yScale(m + t/2) - 5);

// Etykieta Mastera (wyróżniona)
ctx.fillStyle = varColor('--success');
ctx.fillText(m.toFixed(3), w - 5, yScale(m) - 5);

// Etykieta Dolnej Tolerancji
ctx.fillStyle = "#888";
ctx.fillText((m - t/2).toFixed(3), w - 5, yScale(m - t/2) + 12);
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// Nawigacja
function showStart() { document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden')); document.getElementById('view-start').classList.remove('hidden'); }
function showViewStation() { document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden')); document.getElementById('view-station').classList.remove('hidden'); }

function selectMachine(id) { 
    currentMachine = katalogMaszyn[id]; 
    let fullName = currentMachine.nazwa;
    console.log(fullName);
    const list = document.getElementById('stations-list');
    list.innerHTML = '';
    currentMachine.stacje.forEach(s => {
        const b = document.createElement('button'); b.className = 'btn'; b.style.background = '#444';
        b.innerText = s.nazwa; b.onclick = () => { machineAndStation = fullName + ' ' + s.nazwa; currentStation = s; measurements = []; updateStats(); document.getElementById('view-station').classList.add('hidden'); document.getElementById('view-measure').classList.remove('hidden'); };
        list.appendChild(b);
    });
    document.getElementById('view-start').classList.add('hidden'); document.getElementById('view-station').classList.remove('hidden');
}
function undoLast() { measurements.pop(); updateStats(); }

// Init
initKeypad();
showStart();
const sel = document.getElementById('manual-select');
for(let id in katalogMaszyn) { const opt = document.createElement('option'); opt.value = id; opt.innerText = katalogMaszyn[id].nazwa; sel.appendChild(opt); }


if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        // Usunięcie kropki sprawia, że ścieżka jest relatywna do lokalizacji index.html
        navigator.serviceWorker.register('sw.js') 
            .then(reg => {
                // Dodaj powiadomienie o aktualizacji (opcjonalnie)
                reg.onupdatefound = () => {
                    console.log('Znaleziono nową wersję grafika! Odśwież, aby zaktualizować.');
                };
            })
            .catch(err => console.error('Błąd SW:', err));
    });
}
</script>
</body>
</html>
