<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skaner R&R Live</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        
        /* Kontener wideo na cały ekran */
        #scanner-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Wypełnia ekran */
        }

        /* CELOWNIK NA ŻYWO */
        .reticle {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4); /* Przyciemnienie boków */
            z-index: 10;
            pointer-events: none;
        }

        .reticle::after {
            content: "USTAW KOD W RAMCE";
            position: absolute;
            bottom: -30px;
            width: 100%;
            text-align: center;
            color: #00ff00;
            font-size: 12px;
            letter-spacing: 1px;
        }

        #status {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            padding: 10px 0;
        }

        #result-overlay {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 30;
            text-align: center;
        }

        canvas { display: none; } /* Płótno pomocnicze do analizy */
    </style>
</head>
<body>

    <div id="status">Inicjalizacja skanera...</div>

    <div id="scanner-container">
        <video id="video" autoplay playsinline></video>
        <div class="reticle"></div>
        
        <div id="result-overlay">
            <small>ZIDENTYFIKOWANO MASZYNĘ:</small><br>
            <strong id="qr-data" style="font-size: 1.4rem;"></strong><br>
            <button onclick="location.reload()" style="margin-top:10px; padding:10px;">SKANUJ PONOWNIE</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const status = document.getElementById('status');
    const resultOverlay = document.getElementById('result-overlay');
    const qrDataSpan = document.getElementById('qr-data');
    const reticle = document.querySelector('.reticle');

    let isScanning = true; // Flaga kontrolująca stan skanera

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" } 
    })
    .then(stream => {
        video.srcObject = stream;
        status.innerText = "SZUKANIE KODU QR...";
        requestAnimationFrame(tick);
    })
    .catch(err => {
        status.innerText = "BŁĄD KAMERY: " + err.name;
    });

    function tick() {
        if (!isScanning) return; // Jeśli nie skanujemy, zatrzymaj pętlę

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });

            if (code) {
                isScanning = false; // Natychmiastowa blokada kolejnego skanu
                handleSuccess(code.data);
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    function handleSuccess(data) {
        // 1. Efekt wizualny - ramka na jaskrawą zieleń
        reticle.style.borderColor = "#00ff00";
        reticle.style.boxShadow = "0 0 20px #00ff00";
        
        // 2. Informacja dla użytkownika (Cooldown na 800ms przed pokazaniem wyniku)
        status.innerText = "KOD WYKRYTY!";
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Podwójny "klik" wibracji

        // 3. Krótkie opóźnienie (Cool down), żebyś widział co się dzieje
        setTimeout(() => {
            qrDataSpan.innerText = data;
            resultOverlay.style.display = "block";
            status.innerText = "ZAKOŃCZONO SKANOWANIE";
            
            // Opcjonalnie: zatrzymaj kamerę
            // video.srcObject.getTracks().forEach(track => track.stop());
        }, 800); 
    }
</script>
</body>
</html>
