<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Video Test</title>
    <style>
        body { background: #000; color: white; text-align: center; }
        video { width: 100%; max-width: 400px; border: 2px solid #555; }
        .reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border: 2px solid #00ff00;
        }
        #status { padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="status">Inicjalizacja kamery...</div>
    <div style="position: relative; display: inline-block;">
        <video id="video" autoplay playsinline></video>
        <div class="reticle"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } 
        })
        .then(stream => {
            video.srcObject = stream;
            status.innerText = "STREAM DZIAŁA - MOŻEMY BUDOWAĆ!";
        })
        .catch(err => {
            status.innerText = "BŁĄD: Firma/System blokuje wideo na żywo: " + err.name;
        });
    </script>
</body>
</html>
